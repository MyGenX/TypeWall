site_name: TypeWall
site_description: Strict schema-first runtime validation for Python
site_url: https://mygenx.github.io/TypeWall/
repo_url: https://github.com/MyGenX/TypeWall
repo_name: MyGenX/TypeWall
strict: true

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Errors: errors.md
  - Guides:
      - Constraints: guides/constraints.md
      - Composition: guides/composition.md
      - Custom Processing: guides/custom-processing.md
      - Python Typing: guides/typing.md
      - Environment: guides/environment.md
      - CLI: guides/cli.md
      - Schema Export: guides/export.md
      - FastAPI: guides/fastapi.md
  - API Reference: reference/api.md
  - Development:
      - Contributing: development/contributing.md
      - Benchmarks: development/benchmarks.md
      - Conformance: development/conformance.md
