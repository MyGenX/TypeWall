# specstat-version: 1.1.0
name: SpecStat Init

on:
  workflow_dispatch:
    inputs:
      root:
        description: 'OpenSpec root folder'
        required: false
        default: 'openspec'
      force:
        description: 'Regenerate existing visualize.json files'
        required: false
        default: 'false'
        type: boolean

jobs:
  init:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SpecStat Init
        uses: MyGenX/SpecStat@v1
        with:
          mode: init
          root: ${{ inputs.root }}
          force: ${{ inputs.force }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Open init PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: |
            Adds SpecStat-generated JSON metadata needed for visualization in SpecStat.

            **Files added:**
            - `${{ inputs.root }}/index.json` — central index of all specs and changes
            - Per-item `visualize.json` files for visualization metadata

            **Force regenerate:** ${{ inputs.force }}

            These files are derived from your spec markdown files. To revert, close this PR — no spec content is lost.
        run: |
          BRANCH="specstat/init-$(date +%Y%m%d-%H%M%S)"
          git config user.name "specstat-bot"
          git config user.email "bot@specstat.app"
          git checkout -b "$BRANCH"
          git add "${{ inputs.root }}/"
          if git diff --staged --quiet; then
            echo "Nothing generated — all files already existed."
            exit 0
          fi
          git commit -m "chore(openspec): initialize SpecStat JSON files"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(openspec): initialize SpecStat JSON files" \
            --body "$PR_BODY" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH"
