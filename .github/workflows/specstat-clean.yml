# specstat-version: 1.1.0
name: SpecStat Clean

on:
  workflow_dispatch:
    inputs:
      root:
        description: 'OpenSpec root folder'
        required: false
        default: 'openspec'

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Remove generated JSON files
        uses: MyGenX/SpecStat@v1
        with:
          mode: clean
          root: ${{ inputs.root }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Open clean PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: |
            Removes all SpecStat-generated JSON files from `${{ inputs.root }}/`:
            - `index.json`
            - All `visualize.json` files (per-item and folder manifests)

            **Why merge this?** The generated files are invalid or need to be fully regenerated from scratch.

            **After merging:** Run the **SpecStat Init** workflow from the Actions tab or SpecStat settings to regenerate clean files.

            **To cancel:** Close this PR — no files are changed until it is merged.
        run: |
          BRANCH="specstat/clean-$(date +%Y%m%d-%H%M%S)"
          git config user.name "specstat-bot"
          git config user.email "bot@specstat.app"
          git checkout -b "$BRANCH"
          git add "${{ inputs.root }}/"
          if git diff --staged --quiet; then
            echo "No generated files found to clean."
            exit 0
          fi
          git commit -m "chore(openspec): remove SpecStat-generated JSON files"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(openspec): clean SpecStat-generated JSON files" \
            --body "$PR_BODY" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$BRANCH" || {
            echo ""
            echo "❌ PR creation failed."
            echo "   Fix: Settings → Actions → General → Workflow permissions"
            echo "   Enable: 'Allow GitHub Actions to create and approve pull requests'"
            exit 1
          }
