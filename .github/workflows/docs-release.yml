name: Documentation Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen --all-groups --all-extras --python 3.14
      - name: Deploy versioned documentation
        run: |
          VERSION=$(uv run --frozen python -c 'from typewall import __version__; print(__version__)')
          git config user.name github-actions
          git config user.email github-actions@github.com
          uv run --frozen mike deploy --push --update-aliases "$VERSION" latest
          uv run --frozen mike set-default --push latest
